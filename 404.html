<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Stark</title>
  <link rel="icon" type="image/png" href="assets/stark-icon.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .lost-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: var(--color-black);
      color: var(--color-white);
    }
    .lost-stage {
      position: relative;
      width: 160px; height: 160px;
      margin: 0 auto 32px;
    }
    .lost-folder {
      width: 120px; height: 96px;
      background: var(--color-blue);
      border-radius: 6px 6px 14px 14px;
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 8px 32px rgba(147,51,234,0.4);
    }
    .lost-folder::before {
      content: "";
      position: absolute;
      top: -14px; left: 6px;
      width: 40px; height: 16px;
      background: var(--color-blue);
      border-radius: 6px 6px 0 0;
    }
    .lost-folder::after {
      content: "?";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }
    .lost-file {
      position: absolute;
      width: 44px; height: 54px;
      background: var(--color-dark-surface);
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.1);
      animation: float-lost 3s ease-in-out infinite;
    }
    .lost-file-1 { top: 10px; left: 0; animation-delay: 0s; transform: rotate(-12deg); }
    .lost-file-2 { top: 0; right: 10px; animation-delay: 0.8s; transform: rotate(10deg); }
    .lost-file-3 { top: 30px; right: 0; animation-delay: 1.6s; transform: rotate(-6deg); }
    @keyframes float-lost {
      0%, 100% { transform: translateY(0) rotate(-12deg); }
      50% { transform: translateY(-8px) rotate(-12deg); }
    }
    .lost-file-2 { animation-name: float-lost-2; }
    @keyframes float-lost-2 {
      0%, 100% { transform: translateY(0) rotate(10deg); }
      50% { transform: translateY(-10px) rotate(10deg); }
    }
    .lost-file-3 { animation-name: float-lost-3; }
    @keyframes float-lost-3 {
      0%, 100% { transform: translateY(0) rotate(-6deg); }
      50% { transform: translateY(-6px) rotate(-6deg); }
    }
    .lost-code {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--color-link-dark);
      margin: 0 0 12px;
      text-transform: uppercase;
    }
    .lost-shell h1 {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 600;
      letter-spacing: -0.3px;
      margin: 0 0 12px;
      color: var(--color-white);
    }
    .lost-shell p {
      font-size: 17px;
      color: rgba(255,255,255,0.6);
      max-width: 400px;
      line-height: 1.5;
      margin: 0 0 32px;
    }
    .lost-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="lost-shell">
    <div class="lost-stage">
      <div class="lost-file lost-file-1"></div>
      <div class="lost-file lost-file-2"></div>
      <div class="lost-file lost-file-3"></div>
      <div class="lost-folder"></div>
    </div>

    <p class="lost-code">404</p>
    <h1>This file got lost.</h1>
    <p>Ironically, Stark is an app that organizes lost files — but even we can't find this page.</p>

    <div class="lost-actions">
      <a class="button button-outline-light" href="index.html">Go home</a>
      <a class="button button-primary" href="support.html">Get help</a>
    </div>
  </div>
</body>
</html>
